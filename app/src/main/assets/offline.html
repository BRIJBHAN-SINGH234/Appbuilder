<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
    <title>Offline</title>
    <style>
        :root {
            --bg: #fafafa;
            --fg: #303030;
            --muted: #767676;
            --accent: #2c5282;
        }
        * { box-sizing: border-box; }
        html, body {
            height: 100%;
            margin: 0;
            font-family: -apple-system, system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--fg);
            -webkit-font-smoothing: antialiased;
        }
        .wrap {
            min-height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 24px;
            text-align: center;
        }
        .card {
            max-width: 360px;
        }
        .icon {
            font-size: 64px;
            line-height: 1;
            margin-bottom: 16px;
            color: var(--muted);
        }
        h1 { font-size: 24px; margin: 0 0 8px; }
        p  { color: var(--muted); margin: 0 0 24px; line-height: 1.5; }
        button {
            background: var(--accent);
            color: #fff;
            border: 0;
            padding: 12px 28px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        button:active { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <div class="icon">📡</div>
            <h1>You're offline</h1>
            <p>Check your internet connection and try again. Cached pages may not be available.</p>
            <button onclick="window.location.reload()">Retry</button>
        </div>
    </div>
</body>
</html>
